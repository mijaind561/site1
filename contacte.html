<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site1 - Contact</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .contact-info {
            margin: 20px 0;
        }
        .contact-item {
            margin: 10px 0;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 3px solid #333;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Site1</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="contacte.html">Contact</a>
    </nav>
    <div class="container">
        <h1>Contact Us</h1>
        <p>Get in touch with us for any questions or feedback about our Jenkins deployment project.</p>
        
        <div class="contact-info">
            <div class="contact-item">
                <strong>Email:</strong> contact@site1.com
            </div>
            <div class="contact-item">
                <strong>Phone:</strong> +1 234 567 890
            </div>
            <div class="contact-item">
                <strong>Address:</strong> 123 DevOps Street, CI/CD City
            </div>
        </div>

        <h2>Send us a message</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your name">
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Your email">
            
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" placeholder="Your message"></textarea>
            
            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
